      "mkdir -p /dabo/htdocs/botdata/logs ; /dabo/fetch-coinmarketcapids.sh 2>&1 | tee -a /dabo/htdocs/botdata/logs/fetch-coinmarketcapids.log"
    cpu_shares: 128
