  dabo-webpage:
    image: ghcr.io/egabosh/dabo
    restart: unless-stopped
    networks:
      - dabo--network
    user: 10000:10000
    volumes:
      - ./strategies:/dabo/strategies:ro
      - ./dabo-bot.conf:/dabo/dabo-bot.override.conf
      - ./data:/dabo/htdocs:rw
      - ./home:/dabo/home:rw
      - ./notify.local.conf:/usr/local/etc/notify.conf:ro
      - /etc/localtime:/etc/localtime:ro
    entrypoint: >
      /bin/bash -lc
      "mkdir -p /dabo/htdocs/botdata/logs ; /dabo/create_webpage.sh 2>&1 | tee -a /dabo/htdocs/botdata/logs/create_webpage.log"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 128M


  dabo-web:
    image: nginx:latest
    restart: unless-stopped
    networks:
      - dabo--network
    volumes:
      - ./data:/usr/share/nginx/html:ro
      - /etc/localtime:/etc/localtime:ro
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 128M


  dabo-django:
    build:
      context: .
      dockerfile: Dockerfile-django
    volumes:
      - ./data-django:/app
      - ./data:/dabo/htdocs:ro
      - ./secrets_django:/dabo/secrets:rw
      - ./strategies:/dabo/strategies:rw
      - ./dabo-bot.conf:/dabo/dabo-bot.override.conf
    environment:
      - PYTHONUNBUFFERED=1


networks:
  dabo--network:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: br-dabo


