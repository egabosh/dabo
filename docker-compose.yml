services:

  dabo-bot:
    image: ghcr.io/egabosh/dabo
    restart: unless-stopped
    networks:
      - dabo--network
    user: 10000:10000
    volumes:
      - ./secrets:/dabo/secrets:ro
      - ./strategies:/dabo/strategies:ro
      - ./dabo-bot.conf:/dabo/dabo-bot.override.conf
      - ./data:/dabo/htdocs:rw
      - ./home:/dabo/home:rw
      - ./notify.local.conf:/usr/local/etc/notify.conf:ro
      - /etc/localtime:/etc/localtime:ro
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1024M
    entrypoint: >
      /bin/bash -lc
      "mkdir -p /dabo/htdocs/botdata/logs ; /dabo/dabo-bot.sh 2>&1 | tee -a /dabo/htdocs/botdata/logs/dabo-bot.log"
 
